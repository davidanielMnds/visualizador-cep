<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rastreador de CEP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="historico.css">
</head>
<body>
<div class="container">

    <aside class="sidebar">
        <h3>histórico</h3>
        <nav>
            <a href="/index.html">home</a>
            <a class="active">histórico</a>
        </nav>
    </aside>

    <main id="containerMain">
        <section id="containerHistorico">
            <section id="caixa-filtros">
                <h2 id="filtro">filtros</h2>
                <form class="historico-form">
                    <div>
                        <input type="checkbox" class="filtro-selecionado" id="mostrarCep" value="cep" checked>
                        <label for="mostrarCep">CEP</label>
                    </div>
                    <div>
                        <input type="checkbox" class="filtro-selecionado" id="mostrarLogradouro" value="logradouro">
                        <label for="mostrarLogradouro">Logradouro</label>
                    </div>
                    <div>
                        <input type = "checkbox" class="filtro-selecionado" id="mostrarBairro" value="bairro">
                        <label for="mostrarBairro">Bairro</label>
                    </div>
                    <div>
                        <input type="checkbox" class="filtro-selecionado" id="mostrarLocalidade" value="localidade">
                        <label for="mostrarLocalidade">Localidade</label>
                    </div>
                    <div>
                        <input type="checkbox" class="filtro-selecionado" id="mostrarUF" value="uf">
                        <label for="mostrarUF">UF</label>
                    </div>
                    <input type="submit" id="btnFiltrar" value="filtrar">
                </form>
            </section>

            <section id="colunaResultado">
                <h2 id="resultado-historico">Resultado</h2>
                <section id="resultado">
                    <div id="listaHistorico"></div>
                </section>
            </section>

        </section>
    </main>
</div>
<script>
    function getFiltrosMarcados() {
        const checkboxesMarcados = document.querySelectorAll(".filtro-selecionado:checked");
        const filtros = [];
        checkboxesMarcados.forEach(checkbox => filtros.push(checkbox.value));
        return filtros;
    }

    function montarCards(data, filtros) {
        const resultado = document.getElementById("resultado");
        const lista = document.getElementById("listaHistorico");

        if (data.length === 0) {
            resultado.classList.add("vazio");
            return;
        }

        resultado.classList.remove("vazio");
        lista.innerHTML = "";

        data.forEach(endereco => {
            let card = `<div class="card-historico">`;

            if (filtros.includes("cep")) {
                card += `<div class="campo"><span class="label">CEP:</span><span class="valor">${endereco.cep}</span></div>`;
            }
            if (filtros.includes("logradouro")) {
                card += `<div class="campo"><span class="label">Logradouro:</span><span class="valor">${endereco.logradouro}</span></div>`;
            }
            if (filtros.includes("bairro")) {
                card += `<div class="campo"><span class="label">Bairro:</span><span class="valor">${endereco.bairro}</span></div>`;
            }
            if (filtros.includes("localidade")) {
                card += `<div class="campo"><span class="label">Localidade:</span><span class="valor">${endereco.localidade}</span></div>`;
            }
            if (filtros.includes("uf")) {
                card += `<div class="campo"><span class="label">UF:</span><span class="valor">${endereco.uf}</span></div>`;
            }

            card += `</div>`;
            lista.innerHTML += card;
        });
    }

    function carregarHistorico() {
        const filtros = getFiltrosMarcados();

        fetch("/cep/historico")
            .then(response => response.json())
            .then(data => montarCards(data, filtros));
    }

    document.querySelectorAll(".filtro-selecionado").forEach(checkbox => {
        checkbox.addEventListener("change", function() {
            const marcados = document.querySelectorAll(".filtro-selecionado:checked");
            if (marcados.length === 1) {
                marcados[0].disabled = true;
            } else {
                document.querySelectorAll(".filtro-selecionado").forEach(cb => cb.disabled = false);
            }
        });
    });

    document.querySelector(".historico-form").addEventListener("submit", function(event) {
        event.preventDefault();
        carregarHistorico();
    });

    carregarHistorico();
</script>
</body>
</html>

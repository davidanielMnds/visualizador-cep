<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rastreador de CEP</title>
    <link href="https://fonts.googleapis.com/css2?family=NomeDaFonte&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

<aside class="sidebar">
    <h3>Menu</h3>
    <nav>
        <a class="active">home</a>
        <a href="/historico.html">histórico</a>
    </nav>
</aside>

<main>
    <section id="buscar">
        <div id="texto">
            <h2>consultor de cep</h2>
            <p>utilizando api da viacep.com.br</p>
        </div>
        <form id="formularioCep">
            <input type="text" placeholder="CEP" id="txtPesquisa">
            <button type="submit">buscar</button>
        </form>
    </section>

    <section id="resultado"></section>
</main>

</div>
<script>
    document.getElementById("formularioCep").addEventListener("submit", function(event) {
        event.preventDefault();

        const cep = document.getElementById("txtPesquisa").value;

        fetch(`/cep/${cep}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("resultado").innerHTML = `
                
                    <div class="campo">
                        <span class="label">CEP:</span>
                        <span class="valor">${data.cep}</span>
                    </div>

                    <div class="campo">
                        <span class="label">Logradouro:</span>
                        <span class="valor">${data.logradouro}</span>
                    </div>

                    <div class="campo">
                        <span class="label">Bairro:</span>
                        <span class="valor">${data.bairro}</span>    
                    </div>
                    
                    <div class="campo">
                        <span class="label">Localidade:</span>
                        <span class="valor">${data.localidade}</span>
                    </div>
                    
                    <div class="campo">
                        <span class="label">UF:</span>
                        <span class="valor">${data.uf}</span>
                    </div>
                `;
            });
    });
</script>
</body>
</html>
